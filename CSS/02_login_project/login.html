<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serifs;
        background-color: #1a1a1a;
        margin: 0;
        padding: 0%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .card {
        background-color: #cac9c9;
        border-radius: 8px;
        padding: 30px;
        width: 300px;
      }
      h2 {
        color: rgb(3, 3, 96);
        text-align: center;
        margin-bottom: 20px;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      input {
        margin-bottom: 15px;
        padding: 10px;
        border-radius: 5px;
      }
      button {
        background-color: rgb(23, 23, 122);
        color: #fff;
        padding: 10px;
        border-radius: 8px;
      }
      button:hover {
        background-color: rgb(9, 9, 27);
      }
      form:hover {
        border-color: #fff;
      }
      form:after {
        border-color: green;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Login</h2>
      <form>
        <input type="email" name="" id="" placeholder="E-mail" />
        <input type="password" name="" id="" placeholder="Password" />
        <button type="submit">Login</button>
      </form>
    </div>
  </body>
</html>
