<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up Page</title>
    <style>
      body {
        font-family: "Courier New", Courier, monospace;
        background-color: rgb(245, 225, 225);
        margin: 0;
        padding: 0%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .card {
        background-color: rgb(251, 132, 152);
        border-radius: 8px;
        padding: 30px;
        width: 300px;
      }
      h2 {
        color: #fff;
        text-align: center;
        margin-bottom: 20px;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      input {
        margin-bottom: 15px;
        padding: 10px;
        border-radius: 5px;
      }
      button {
        background-color: rgb(253, 70, 131);
        color: #fff;
        padding: 10px;
        border-radius: 8px;
      }
      button:hover {
        background-color: rgb(250, 151, 168);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Signup</h2>
      <form>
        <input type="text" name="" id="" placeholder="First Name" />
        <input type="text" name="" id="" placeholder="Last Name" />
        <input type="email" name="" id="" placeholder="E-mail" />
        <input type="password" name="" id="" placeholder="Password" />
        <button type="submit">Signup</button>
      </form>
    </div>
  </body>
</html>
