<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media</title>
  </head>
  <body>
    <h1>This is media learning</h1>
    <img src="./images.jpeg" alt="Dog" width="200px" />
    <p>Dog</p>
    <figure>
      <img src="./images.jpeg" alt="Dog" />
      <figcaption>Dog</figcaption>
    </figure>
    <video
      src="./video.mp4"
      controls
      controllists="nodownload"
      width="400px"
    ></video>
  </body>
</html>
